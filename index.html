<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbolpedia</title>
    <script src="./js/script.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="header-titulo">Explorador de Fútbol</h1>
        <p class="header-texto">Consulta partidos y detalles usando una API</p>
    </header>

    <main class="main">
        <section class="busqueda">
            <input type="text" id="buscador" class="busqueda_input" placeholder="Buscar partido, equipo o competición">
        </section>

        <section class="partidos">
            <h2 class="partidos-titulo">Listado de partidos</h2>
            <div id="contenedor-partidos" class="grid-partidos">
                <!--Tarjetas con JavaScript-->
            </div>
        </section>
    </main>

    <script src="./js/script.js"></script>
    
</body>
</html>
