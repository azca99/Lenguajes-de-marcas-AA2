<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbolpedia</title>
    <script src="./js/script.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="cabecera">
        <h1>Explorador de Fútbol</h1>
        <p class="subtitulo">Consulta partidos y detalles usando una API</p>
    </header>

    <main class="contenedor">
        <section class="buscador-seccion">
            <input type="text" id="buscador" placeholder="Buscar partido, equipo o competición">
        </section>

        <section>
            <h2>Listado de partidos</h2>
            <div id="contenedor-partidos" class="grid-partidos">
                <!--Tarjetas con JavaScript-->
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    
</body>
</html>
